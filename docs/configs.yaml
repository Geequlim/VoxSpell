DocsModule:
  assetsDirs:
    - ../node_modules/@tinyaxis/tiny-docs/assets
    - ./assets
  copyright: © 2026 Geequlim
  env: development
  logo: /assets/logo.svg
  navigator:
    buttons:
      - match: equals
        title: 首页
        url: /
      - match: startsWith
        prefix: /
        title: 文档
        url: /getting-started
      - match: startsWith
        prefix: /preview
        title: 预览
        url: /preview
      - match: startsWith
        prefix: /asset-memo
        title: AssetMemo
        url: /asset-memo
  pages:
    - data:
        features:
          - description: 集成 Fcitx 5，在日常键盘输入之外提供按住说话的语音输入体验。
            image: /assets/dev/docs/img/icons8-app-development.svg
            title: 自然输入
          - description: 支持多种语音识别服务、用户词典与确定性文本处理。
            image: /assets/dev/docs/img/icons8-dependencies.svg
            title: 灵活组合
          - description: 通过 GTK 桌面程序统一完成配置、状态查看与故障诊断。
            image: /assets/dev/docs/img/icons8-correction.svg
            title: 桌面配置
      path: ''
      shell:
        breadcrumbs: false
        footerNoMargin: true
        sidebar: false
      template: '@docs/pages/index.hbs'
      title: 首页
  publish:
    brokenLinks:
      action: warn
    llm:
      enabled: true
      includeFrontmatter: true
    routePrefix: /
  remaps:
    AGENTS:
      order: -1
      space: Agent
      target: AGENTS.md
      title: AGENTS.md
    getting-started:
      order: -1
      space: 开发文档
      target: README
      title: 快速开始
  routePrefix: /
  search:
    emptyText: 没有找到相关结果
    enabled: true
    errorText: 搜索暂时不可用，请稍后重试
    initialText: 输入关键词开始搜索
    placeholder: 搜索文档
    searchingText: 正在搜索...
    shortcut: Ctrl K
  showLineNumbers: false
  spaces:
    - dirs:
        - linkPrefix: ''
          path: docs
          title: 快速开始
      title: 开发文档
    - agentSkillNoOrphanDirs: true
      dirs:
        - path: .agents/skills
          title: skills
      noOrphanDirs: true
      order: 100
      title: Agent
      useOrphanDocsAsDirs: true
  tagline: 面向 Linux 与 Fcitx 5 的现代 AI 语音输入工具
  title: 言出法随
  workspace: ..
